  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fafafa;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Pixel bugs canvas ── */
    #pixelBugs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── Logos row ── */
    .logos {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrapper::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 16px;
      filter: blur(20px);
      z-index: -1;
    }

    .logo-supabase::after {
      background: #3ECF8E;
      opacity: 0.08;
    }

    .logo-commit::after {
      background: #fa0d07;
      opacity: 0.08;
    }

    .logo-supabase {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-supabase svg {
      height: 24px;
      width: auto;
    }

    .logo-supabase .wordmark {
      font-family: 'Inter', sans-serif;
      font-size: 21px;
      font-weight: 400;
      color: #fafafa;
      letter-spacing: -0.01em;
    }

    .logo-commit {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-commit svg {
      height: 24px;
      width: auto;
    }

    .logo-commit .wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 21px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fafafa;
    }

    .separator {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.08em;
      user-select: none;
    }

    /* ── Coming soon text ── */
    .coming-soon {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.08em;
    }

    .dots {
      display: inline-block;
    }

    .dots span {
      animation: dotFade 1.8s ease-in-out infinite;
      opacity: 0.2;
    }

    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.3s; }
    .dots span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes dotFade {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    .email-form {
      display: flex;
      gap: 8px;
    }

    .email-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fafafa;
      width: 260px;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .email-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .email-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.2s;
    }

    .email-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ── Success state ── */
    .email-success {
      display: none;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .email-success.show {
      display: block;
      opacity: 1;
      order: 3; /* always below loader bar */
    }

    .email-form.hidden {
      display: none;
    }

    /* ── Insider mode (all icons discovered) ── */
    /* Terminal amber: #c9952a */
    .email-form.insider .email-btn {
      background: rgba(201, 149, 42, 0.12);
      border-color: rgba(201, 149, 42, 0.35);
      color: #fff;
      font-weight: 500;
      animation: insiderPulse 4s ease-in-out infinite;
    }

    .email-form.insider .email-btn:hover {
      background: rgba(201, 149, 42, 0.22);
      border-color: rgba(201, 149, 42, 0.5);
    }

    .email-form.insider .email-input {
      border-color: rgba(201, 149, 42, 0.2);
    }

    .email-form.insider .email-input:focus {
      border-color: rgba(201, 149, 42, 0.35);
    }

    @keyframes insiderPulse {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50% { box-shadow: 0 0 20px rgba(201, 149, 42, 0.08); }
    }

    /* Upgrade-only: just the button, no input, below the loader */
    .email-form.upgrade-only .email-input {
      display: none;
    }
    .email-form.upgrade-only {
      justify-content: center;
      order: 2; /* push below loader bar */
    }

    /* Email capture uses flexbox column — enable ordering */
    .email-capture {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .logos {
        gap: 20px;
      }

      .logo-supabase svg {
        height: 22px;
      }

      .logo-commit {
        font-size: 17px;
      }

      .email-form {
        flex-direction: column;
        width: 100%;
        padding: 0 24px;
      }

      .email-input {
        width: 100%;
      }
    }

    /* ── Retro loader bar (centered in flow) ── */
    .loader-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #555;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
      margin-top: 8px;
    }

    .loader-bar.visible {
      opacity: 1;
      transform: translateY(0);
      order: 1; /* between form and success */
    }

    .loader-label {
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .loader-blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .loader-track {
      width: 80px;
      height: 8px;
      border: 1px solid #333;
      background: #111;
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: #555;
      transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

    /* Scanline shimmer on the fill */
    .loader-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.3) 3px,
        rgba(0,0,0,0.3) 4px
      );
    }

    .loader-pct {
      min-width: 24px;
      text-align: right;
      color: #444;
      font-size: 10px;
    }

    /* ── CRT scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.02) 2px,
        rgba(0, 0, 0, 0.02) 4px
      );
    }
  </style>

    // Render icon to offscreen canvas — sync for path, async for image
    function renderIcon(icon) {
      if (icon.d) {
        const off = document.createElement('canvas');
        off.width = SZ; off.height = SZ;
        const c = off.getContext('2d');
        c.scale(SZ / icon.vb, SZ / icon.vb);
        c.fillStyle = '#666666';
        c.fill(new Path2D(icon.d));
        return Promise.resolve(off);
      } else if (icon.src) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const off = document.createElement('canvas');
            off.width = SZ; off.height = SZ;
            const c = off.getContext('2d');
            // Draw and then desaturate to grey
            c.drawImage(img, 0, 0, SZ, SZ);
            const imgData = c.getImageData(0, 0, SZ, SZ);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
              const grey = Math.floor(d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
              const muted = Math.floor(grey * 0.4); // darken towards bg
              d[i] = d[i+1] = d[i+2] = muted;
            }
            c.putImageData(imgData, 0, 0);
            resolve(off);
          };
          img.src = icon.src;
        });
      }
    }

    // Rasterize icon into pixel grid for the glitch reveal
    function getIconPixels(offscreen) {
      const imgData = offscreen.getContext('2d').getImageData(0, 0, SZ, SZ);
      const pixels = [];
      const step = 2;
      for (let y = 0; y < SZ; y += step) {
        for (let x = 0; x < SZ; x += step) {
          const a = imgData.data[(y * SZ + x) * 4 + 3];
          if (a > 30) pixels.push({ x, y, a: a / 255 });
        }
      }
      return pixels;
    }

        const z = shuffled[i % shuffled.length];
        const fx = z.xMin + Math.random() * (z.xMax - z.xMin);
        const fy = z.yMin + Math.random() * (z.yMax - z.yMin);
        const offscreen = await renderIcon(ICONS[i]);

    let lastInteractionTime = Date.now();  // last time user hovered an icon

    const BAIT_AFTER_DISCOVERY = 3000;   // 3s after discovering one → bait next
    const BAIT_RAMP = 1500;
    const BAIT_MAX = 0.35;

    function pickBaitTarget() {
      // Prefer undiscovered icons closer to center of viewport
      const undiscovered = spots
        .map((s, i) => ({ s, i }))
        .filter(({ s }) => !s.discovered);
      if (undiscovered.length === 0) return -1;

      // Sort by distance to center — pick from the closest half randomly
      const cxPage = W / 2, cyPage = H / 2;
      undiscovered.sort((a, b) => {
        const da = Math.sqrt((a.s.x + SZ/2 - cxPage)**2 + (a.s.y + SZ/2 - cyPage)**2);
        const db = Math.sqrt((b.s.x + SZ/2 - cxPage)**2 + (b.s.y + SZ/2 - cyPage)**2);
        return da - db;
      });
      const pool = undiscovered.slice(0, Math.max(1, Math.ceil(undiscovered.length / 2)));
      return pool[Math.floor(Math.random() * pool.length)].i;
    }

        const cy = spot.y + SZ / 2;

            if (hash > baitIntensity * 1.5) continue; // more intensity = more pixels

            const scatter = (1 - baitIntensity) * 12 + 3;
            const drawX = spot.x + px.x + (Math.random() - 0.5) * scatter;
            const drawY = spot.y + px.y + (Math.random() - 0.5) * scatter;

            if (Math.random() > 0.7) continue;

            ctx.globalAlpha = baitIntensity * 1.5 * px.a;
            ctx.fillRect(Math.floor(drawX), Math.floor(drawY), 3, 3);

            let drawY = spot.y + px.y;

              drawY += (Math.random() - 0.5) * jitter;

            ctx.globalAlpha = Math.min(1, rev * 2) * px.a * pixelFade;

      if (mode === 'normal') {
        input.style.display = '';
        input.required = true;
        btn.textContent = 'notify me';
      } else if (mode === 'insider') {
        form.classList.add('insider');
        input.style.display = '';
        input.required = true;
        btn.textContent = 'I want in';
      } else if (mode === 'upgrade') {
        form.classList.add('insider', 'upgrade-only');
        input.style.display = 'none';
        input.required = false; // critical: skip HTML validation
        btn.textContent = 'upgrade me';
      }
    }

    // ── Loader bar ──
    const loaderBar  = $('loaderBar');
    const loaderFill = $('loaderFill');
    const loaderPct  = $('loaderPct');
    let loaderShown = false;
    let insiderUnlocked = false;

    function updateLoader() {
      const discovered = spots.filter(s => s.discovered).length;
      const total = spots.length;

      if (!loaderShown && discovered > 0) {
        loaderShown = true;
        loaderBar.classList.add('visible');
      }

      loaderFill.style.width = (discovered / total * 100) + '%';
      loaderPct.textContent = discovered + '/' + total;

      // ── All 6 found: unlock insider ──
      if (discovered === total && !insiderUnlocked) {
        insiderUnlocked = true;
        LS.markInsider();

        // Loader → amber
        loaderFill.style.background = '#c9952a';
        document.querySelector('.loader-label').innerHTML = 'unlocked';
        document.querySelector('.loader-label').style.color = 'rgba(201, 149, 42, 0.6)';
        document.querySelector('.loader-pct').style.color = 'rgba(201, 149, 42, 0.6)';

        // What to show depends on current submission state
        if (LS.hasSubmitted()) {
          // Already on waitlist → just show upgrade button (no email needed)
          showForm('upgrade');
        } else {
          // Never submitted → full insider form
          showForm('insider');
        }
      }
    }

    // ── Restore state on page load ──
    (function restoreState() {
      if (LS.isInsider()) {
        // Show loader bar fully filled in amber — instant, no animation
        insiderUnlocked = true;
        loaderShown = true;
        // Disable transitions for instant display
        loaderBar.style.transition = 'none';
        loaderFill.style.transition = 'none';
        loaderBar.classList.add('visible');
        loaderFill.style.width = '100%';
        loaderFill.style.background = '#c9952a';
        loaderPct.textContent = '6/6';
        loaderPct.style.color = 'rgba(201, 149, 42, 0.6)';
        document.querySelector('.loader-label').innerHTML = 'unlocked';
        document.querySelector('.loader-label').style.color = 'rgba(201, 149, 42, 0.6)';
      }

      if (LS.isInsider() && LS.hasSubmitted()) {
        showMessage('you are an insider', AMBER);
        // Instant — no fade-in for returning insiders
        success.style.transition = 'none';
      } else if (LS.isInsider() && !LS.hasSubmitted()) {
        showForm('insider');
      } else if (LS.hasSubmitted()) {
        showMessage('you are on the list');
      }
      // else: fresh visitor → default form already visible
    })();

    // ── Form submit handler ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const isUpgrade = form.classList.contains('upgrade-only');
      const email = isUpgrade ? LS.getEmail() : input.value;

      if (!email) {
        // Edge case: upgrade mode but no stored email → show full insider form
        showForm('insider');
        return;
      }

      btn.textContent = '...';
      btn.disabled = true;

      try {
        const formData = new URLSearchParams();
        formData.append('email', email);
        if (insiderUnlocked) formData.append('insider', 'true');
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: formData });

        LS.markSubmitted(email);
        if (insiderUnlocked) LS.markInsider();

        // ── Confirmation message ──
        if (insiderUnlocked) {
          // Both upgrade and first-time insider get the same gold message
          showMessage('gg, you are now an insider', AMBER);
        } else {
          // Normal waitlist
          showMessage("you are on the list");
        }
      } catch (err) {
        btn.textContent = insiderUnlocked
          ? (isUpgrade ? 'upgrade me' : 'I want in')
          : 'notify me';
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
