    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0a;
      color: #fafafa;
      font-family: 'Inter', -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* ── Pixel bugs canvas ── */
    #pixelBugs {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── Logos row ── */
    .logos {
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-wrapper::after {
      content: '';
      position: absolute;
      inset: -12px;
      border-radius: 16px;
      filter: blur(20px);
      z-index: -1;
    }

    .logo-supabase::after {
      background: #3ECF8E;
      opacity: 0.08;
    }

    .logo-commit::after {
      background: #fa0d07;
      opacity: 0.08;
    }

    .logo-supabase {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-supabase svg {
      height: 24px;
      width: auto;
    }

    .logo-supabase .wordmark {
      font-family: 'Inter', sans-serif;
      font-size: 21px;
      font-weight: 400;
      color: #fafafa;
      letter-spacing: -0.01em;
    }

    .logo-commit {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-commit svg {
      height: 24px;
      width: auto;
    }

    .logo-commit .wordmark {
      font-family: 'JetBrains Mono', monospace;
      font-size: 21px;
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #fafafa;
    }

    /* ── Osscar nav badge (top-right) ── */
    .osscar-nav {
      position: fixed;
      top: 20px;
      left: 24px;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 9px;
      text-decoration: none;
      cursor: default;
    }

    .osscar-stack {
      position: relative;
      height: 24px;
      display: inline-flex;
      align-items: center;
    }

    .osscar-img {
      height: 100%;
      width: auto;
      transition: opacity 1.4s ease;
    }

    .osscar-amber {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .osscar-white { opacity: 0.5; }

    .osscar-label {
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.4);
      transition: color 1.4s ease;
    }

    #osscarIcon.explorer .osscar-amber { opacity: 1; }
    #osscarIcon.explorer .osscar-white { opacity: 0; }
    #osscarIcon.explorer .osscar-label { color: #F59E0B; }

    .separator {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.08em;
      user-select: none;
    }

    /* ── Coming soon text ── */
    .coming-soon {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.35);
      letter-spacing: 0.08em;
    }

    .dots {
      display: inline-block;
    }

    .dots span {
      animation: dotFade 1.8s ease-in-out infinite;
      opacity: 0.2;
    }

    .dots span:nth-child(1) { animation-delay: 0s; }
    .dots span:nth-child(2) { animation-delay: 0.3s; }
    .dots span:nth-child(3) { animation-delay: 0.6s; }

    @keyframes dotFade {
      0%, 60%, 100% { opacity: 0.2; }
      30% { opacity: 1; }
    }

    .email-form {
      display: flex;
      gap: 8px;
    }

    .email-input {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 16px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      color: #fafafa;
      width: 260px;
      outline: none;
      transition: border-color 0.2s;
    }

    .email-input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    .email-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
    }

    .email-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 10px 20px;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      transition: all 0.2s;
    }

    .email-btn:hover {
      background: rgba(255, 255, 255, 0.12);
      color: rgba(255, 255, 255, 0.85);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ── Email field wrapper ── */
    .email-field-wrap {
      position: relative;
    }

    .email-error {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 4px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255, 80, 80, 0.7);
      letter-spacing: 0.02em;
      white-space: nowrap;
    }

    .email-error.show {
      display: block;
    }

    .email-input.invalid {
      border-color: rgba(255, 80, 80, 0.3);
    }

    /* ── Success state ── */
    .email-success {
      display: none;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.5);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .email-success.show {
      display: block;
      opacity: 1;
      order: 2; /* below loader bar */
    }

    .email-form.hidden {
      display: none;
    }

    /* ── Explorer mode (all icons discovered) ── */
    /* Terminal amber: #c9952a */
    .email-form.explorer .email-btn {
      background: rgba(201, 149, 42, 0.12);
      border-color: rgba(201, 149, 42, 0.35);
      color: #fff;
      font-weight: 500;
      animation: explorerPulse 4s ease-in-out infinite;
    }

    .email-form.explorer .email-btn:hover {
      background: rgba(201, 149, 42, 0.22);
      border-color: rgba(201, 149, 42, 0.5);
    }

    .email-form.explorer .email-input {
      border-color: rgba(201, 149, 42, 0.2);
    }

    .email-form.explorer .email-input:focus {
      border-color: rgba(201, 149, 42, 0.35);
    }

    @keyframes explorerPulse {
      0%, 100% { box-shadow: 0 0 0 0 transparent; }
      50% { box-shadow: 0 0 20px rgba(201, 149, 42, 0.08); }
    }

    /* Upgrade-only: just the button, no input, below the loader */
    .email-form.upgrade-only .email-input {
      display: none;
    }
    .email-form.upgrade-only {
      justify-content: center;
      order: 1; /* below loader bar */
    }

    /* Email capture uses flexbox column — enable ordering */
    .email-capture {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      margin-top: 8px;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #pixelBugs { display: none !important; }
      .loader-bar { display: none !important; }

      .logos { gap: 20px; }
      .logo-supabase svg { height: 22px; }
      .logo-commit { font-size: 17px; }

      .email-form {
        flex-direction: column;
        width: 100%;
        padding: 0 24px;
      }

      .email-input { width: 100%; }
    }

    /* ── Retro loader bar (centered in flow) ── */
    .loader-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: #555;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.8s ease, transform 0.8s ease;
      pointer-events: none;
      margin-top: 8px;
    }

    .loader-bar.visible {
      opacity: 1;
      transform: translateY(0);
      order: -1; /* above everything by default */
    }

    .loader-label {
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .loader-blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .loader-track {
      width: 110px;
      height: 10px;
      border: 1px solid #333;
      background: #111;
      position: relative;
      overflow: hidden;
    }

    .loader-fill {
      height: 100%;
      width: 0%;
      background: #555;
      transition: width 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
    }

    /* Scanline shimmer on the fill */
    .loader-fill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.3) 3px,
        rgba(0,0,0,0.3) 4px
      );
    }

    .loader-pct {
      min-width: 24px;
      text-align: right;
      color: #444;
      font-size: 10px;
    }

    /* ── CRT scanline overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 2px,
        rgba(0, 0, 0, 0.02) 2px,
        rgba(0, 0, 0, 0.02) 4px
      );
    }
  </style>

    // Render icon to offscreen canvas — sync for path, async for image
    function renderIcon(icon, color = '#666666') {
      if (icon.d) {
        const off = document.createElement('canvas');
        off.width = SZ * dpr; off.height = SZ * dpr;
        const c = off.getContext('2d');
        c.scale((SZ / icon.vb) * dpr, (SZ / icon.vb) * dpr);
        c.fillStyle = color;
        c.fill(new Path2D(icon.d));
        return Promise.resolve(off);
      } else if (icon.src) {
        return new Promise(resolve => {
          const img = new Image();
          img.onload = () => {
            const off = document.createElement('canvas');
            off.width = SZ; off.height = SZ;
            const c = off.getContext('2d');
            // Draw and then desaturate to grey
            c.drawImage(img, 0, 0, SZ, SZ);
            const imgData = c.getImageData(0, 0, SZ, SZ);
            const d = imgData.data;
            for (let i = 0; i < d.length; i += 4) {
              const grey = Math.floor(d[i] * 0.3 + d[i+1] * 0.59 + d[i+2] * 0.11);
              const muted = Math.floor(grey * 0.4); // darken towards bg
              d[i] = d[i+1] = d[i+2] = muted;
            }
            c.putImageData(imgData, 0, 0);
            resolve(off);
          };
          img.src = icon.src;
        });
      }
    }

    // Rasterize icon into pixel grid for the glitch reveal
    function getIconPixels(offscreen) {
      const pw = offscreen.width;
      const ph = offscreen.height;
      const imgData = offscreen.getContext('2d').getImageData(0, 0, pw, ph);
      const pixels = [];
      const step = Math.round(2 * dpr);
      for (let y = 0; y < ph; y += step) {
        for (let x = 0; x < pw; x += step) {
          const a = imgData.data[(y * pw + x) * 4 + 3];
          if (a > 30) pixels.push({ x: x / dpr, y: y / dpr, a: a / 255 });
        }
      }
      return pixels;
    }

    // ── 6 zones: one per icon, avoids Osscar nav (top-left) and center UI ──
    // Center UI occupies roughly 25–75% x, 15–85% y — kept clear.
    // Top-left (0–22% x, 0–25% y) also kept clear for the Osscar nav badge.
    const ZONES = [
      { xMin: 0.26, xMax: 0.74, yMin: 0.04, yMax: 0.16 },  // top-center   (above UI)
      { xMin: 0.78, xMax: 0.96, yMin: 0.04, yMax: 0.34 },  // top-right
      { xMin: 0.02, xMax: 0.20, yMin: 0.28, yMax: 0.58 },  // left-mid
      { xMin: 0.80, xMax: 0.97, yMin: 0.38, yMax: 0.68 },  // right-mid
      { xMin: 0.02, xMax: 0.22, yMin: 0.65, yMax: 0.90 },  // bottom-left
      { xMin: 0.28, xMax: 0.72, yMin: 0.84, yMax: 0.96 },  // bottom-center
    ];

    // Minimum pixel distance between any two icon centres
    const MIN_ICON_DIST = SZ * 3.5;

    async function placeIcons() {
      spots.length = 0;
      // Each icon gets its own zone (shuffle so assignment varies per load)
      const shuffled = [...ZONES].sort(() => Math.random() - 0.5);
      for (let i = 0; i < ICONS.length; i++) {
        const z = shuffled[i];
        // Retry up to 25 times to satisfy min-distance from already-placed icons
        let px, py, attempts = 0;
        do {
          px = Math.floor(W * (z.xMin + Math.random() * (z.xMax - z.xMin)) - SZ / 2);
          py = Math.floor(H * (z.yMin + Math.random() * (z.yMax - z.yMin)) - SZ / 2);
          attempts++;
        } while (
          attempts < 25 &&
          spots.some(s => Math.hypot(s.x - px, s.y - py) < MIN_ICON_DIST)
        );
        const offscreen = await renderIcon(ICONS[i]);
        const amberOffscreen = await renderIcon(ICONS[i], '#F59E0B');
        const pixels = getIconPixels(offscreen);
        spots.push({
          x: px,
          y: py,
          offscreen,
          amberOffscreen,
          pixels,
          reveal: 0,
          targetReveal: 0,
          discovered: false,
        });
      }
    }
    placeIcons().then(() => { initialized = true; animate(); });

    // ── Mouse tracking ──
    let mx = -1000, my = -1000;
    const REVEAL_RADIUS = 150;

    document.addEventListener('mousemove', e => {
      mx = e.clientX;
      my = e.clientY;
    });

    document.addEventListener('mouseleave', () => {
      mx = -1000;
      my = -1000;
    });

    // ── Attraction / bait system ──
    // Each spot tracks: discovered (bool), baitLevel (0-1), baiting (bool)
    // After idle time, we pick an undiscovered icon and ramp up baitLevel
    // to show a few flickering pixels — just enough to catch the eye.
    // Once user hovers it (reveal > 0.6), mark discovered. Move on.
    let lastInteractionTime = Date.now();  // last time user hovered an icon
    let baitTarget = -1;
    let baitStartTime = 0;
    let baitCooldown = 0;
    let discoveredCount = 0;
    const IDLE_BEFORE_FIRST_BAIT = 2000; // 2s idle before very first bait
    const BAIT_AFTER_DISCOVERY = 3000;   // 3s after discovering one → bait next
    const BAIT_RAMP = 1500;
    const BAIT_MAX = 0.35;

    function pickBaitTarget() {
      // Prefer undiscovered icons closer to center of viewport
      const undiscovered = spots
        .map((s, i) => ({ s, i }))
        .filter(({ s }) => !s.discovered);
      if (undiscovered.length === 0) return -1;

      // Sort by distance to center — pick from the closest half randomly
      const cxPage = W / 2, cyPage = H / 2;
      undiscovered.sort((a, b) => {
        const da = Math.sqrt((a.s.x + SZ/2 - cxPage)**2 + (a.s.y + SZ/2 - cyPage)**2);
        const db = Math.sqrt((b.s.x + SZ/2 - cxPage)**2 + (b.s.y + SZ/2 - cyPage)**2);
        return da - db;
      });
      const pool = undiscovered.slice(0, Math.max(1, Math.ceil(undiscovered.length / 2)));
      return pool[Math.floor(Math.random() * pool.length)].i;
    }

    // ── Animation loop ──
    const now = () => Date.now();

    function animate() {
      ctx.clearRect(0, 0, W, H);

      let anyHovering = false;

      for (let si = 0; si < spots.length; si++) {
        const spot = spots[si];

        // Distance from mouse to icon center
        const cx = spot.x + SZ / 2;
        const cy = spot.y + SZ / 2;
        const dist = Math.sqrt((mx - cx) ** 2 + (my - cy) ** 2);

        // Target reveal based on proximity
        spot.targetReveal = dist < REVEAL_RADIUS ? Math.max(0, 1 - dist / REVEAL_RADIUS) : 0;

        // If mouse is actively revealing this icon
        if (spot.targetReveal > 0.1) {
          anyHovering = true;
          lastInteractionTime = now();

          // If this was the bait target, mouse found it — stop baiting
          if (baitTarget === si) {
            baitTarget = -1;
          }
        }

        // Mark discovered when user gets a good look (reveal > 0.7, fully visible)
        if (spot.reveal > 0.7 && !spot.discovered) {
          spot.discovered = true;
          spot.discoveredTime = now();
          discoveredCount++;
          baitCooldown = now() + BAIT_AFTER_DISCOVERY;
          baitTarget = -1;
          if (window.posthog) posthog.capture('icon_discovered', { icon_index: si, total_discovered: discoveredCount });
          updateLoader();
        }

        // Smooth lerp toward target
        const speed = spot.targetReveal > spot.reveal ? 0.08 : 0.04;
        spot.reveal += (spot.targetReveal - spot.reveal) * speed;

        // ── Bait flicker for this spot ──
        let baitIntensity = 0;
        if (baitTarget === si && spot.targetReveal < 0.05) {
          const elapsed = now() - baitStartTime;
          const ramp = Math.min(1, elapsed / BAIT_RAMP);
          // Irregular pulse — multiple overlapping sines for organic feel
          const pulse = ramp < 1 ? ramp :
            0.5 + 0.25 * Math.sin(elapsed / 600) + 0.25 * Math.sin(elapsed / 1100);
          baitIntensity = pulse * BAIT_MAX;
        }

        // ── BAIT-ONLY rendering: scattered bright pixels, no icon reveal ──
        if (baitIntensity > 0.01 && spot.reveal < 0.05) {
          const t = now();
          // Pick a random subset of icon pixels and draw them scattered
          for (const px of spot.pixels) {
            // Use time-varying hash so different pixels appear each frame
            const hash = ((px.x * 7 + px.y * 13 + Math.floor(t / 150)) % 100) / 100;
            if (hash > baitIntensity * 1.5) continue; // more intensity = more pixels

            // Scatter: pixels jitter around their real position
            const scatter = (1 - baitIntensity) * 12 + 3;
            const drawX = spot.x + px.x + (Math.random() - 0.5) * scatter;
            const drawY = spot.y + px.y + (Math.random() - 0.5) * scatter;

            // Random flicker: skip ~30% of pixels each frame for jitter feel
            if (Math.random() > 0.7) continue;

            ctx.fillStyle = '#777';
            ctx.globalAlpha = baitIntensity * 1.5 * px.a;
            ctx.fillRect(Math.floor(drawX), Math.floor(drawY), 3, 3);
          }
          continue; // skip normal rendering for bait-only mode
        }

        // ── Discovered icon: persistent render at idle ──
        if (spot.discovered && spot.targetReveal < 0.05) {
          ctx.globalAlpha = PERSIST_ALPHA;
          ctx.drawImage(explorerUnlocked ? spot.amberOffscreen : spot.offscreen, spot.x, spot.y, SZ, SZ);
          continue;
        }

        // ── Normal mouse-driven reveal ──
        const rev = spot.reveal;
        if (rev < 0.005) continue;

        // Smooth crossfade: pixels fade out as clean SVG fades in
        const pixelFade = rev < 0.5 ? 1 : Math.max(0, 1 - (rev - 0.5) / 0.3);
        const cleanFade = rev < 0.3 ? 0 : Math.min(1, (rev - 0.3) / 0.4);

        // Pixel layer
        if (pixelFade > 0.01) {
          for (const px of spot.pixels) {
            const threshold = (px.x * 7 + px.y * 13) % 100 / 100;
            if (rev < threshold * 0.8) continue;

            const isSettled = rev > 0.6;
            let drawX = spot.x + px.x;
            let drawY = spot.y + px.y;

            if (!isSettled) {
              const jitter = (1 - rev) * 4;
              drawX += (Math.random() - 0.5) * jitter;
              drawY += (Math.random() - 0.5) * jitter;
              if (Math.random() > rev * 1.5) continue;
            }

            ctx.fillStyle = explorerUnlocked ? '#F59E0B' : '#555555';
            ctx.globalAlpha = Math.min(1, rev * 2) * px.a * pixelFade;
            ctx.fillRect(Math.floor(drawX), Math.floor(drawY), 2, 2);
          }
        }

        // Clean SVG layer
        if (cleanFade > 0.01) {
          ctx.globalAlpha = cleanFade;
          ctx.drawImage(explorerUnlocked ? spot.amberOffscreen : spot.offscreen, spot.x, spot.y, SZ, SZ);
        }
      }

      // ── Bait logic: pick a new target after idle ──
      const t = now();
      if (baitTarget === -1 && t > baitCooldown) {
        const idle = t - lastInteractionTime;
        // Before any discovery: wait 5s. After first discovery: bait immediately after cooldown
        const idleThreshold = discoveredCount > 0 ? 0 : IDLE_BEFORE_FIRST_BAIT;
        if (idle > idleThreshold) {
          baitTarget = pickBaitTarget();
          if (baitTarget >= 0) {
            baitStartTime = t;
          }
        }
      }
      // If baiting has been going for 10s with no interaction, rotate to another
      if (baitTarget >= 0 && (t - baitStartTime) > 10000 && spots[baitTarget].targetReveal < 0.05) {
        baitTarget = -1;
        baitCooldown = t + 2000; // 2s then bait the next one
      }

      ctx.globalAlpha = 1;
      requestAnimationFrame(animate);
    }

    // ── State management ──
    const AMBER = 'rgba(201, 149, 42, 0.8)';
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzleOOML-O7VXm58u_Tv7o_5BN_RmEzdGGDsDLumjDlpimJHuVXhivEP44ZN6bAZqV1qQ/exec';

    const LS = {
      hasSubmitted: () => localStorage.getItem('oss-index-submitted') === 'true',
      getEmail:     () => localStorage.getItem('oss-index-email') || '',
      isExplorer:    () => localStorage.getItem('oss-index-explorer') === 'true',
      markSubmitted: (email) => {
        localStorage.setItem('oss-index-submitted', 'true');
        localStorage.setItem('oss-index-email', email);
      },
      markExplorer: () => localStorage.setItem('oss-index-explorer', 'true'),
    };

    const $ = id => document.getElementById(id);
    const form    = $('emailForm');
    const input   = form.querySelector('.email-input');
    const btn     = form.querySelector('.email-btn');
    const success = $('emailSuccess');

    // Helper: show a single message, hide the form
    function showMessage(text, color = '#fff') {
      form.classList.add('hidden');
      success.style.display = ''; // clear any inline override
      success.textContent = text;
      success.style.color = color;
      success.classList.add('show');
    }

    // Helper: show the form in a specific mode
    function showForm(mode) {
      form.classList.remove('hidden', 'explorer', 'upgrade-only');
      success.classList.remove('show');
      success.style.display = 'none';
      form.style.display = '';
      btn.disabled = false;

      if (mode === 'normal') {
        input.style.display = '';
        input.required = true;
        btn.textContent = 'notify me';
      } else if (mode === 'explorer') {
        form.classList.add('explorer');
        input.style.display = '';
        input.required = true;
        btn.textContent = 'explorer access';
      } else if (mode === 'upgrade') {
        form.classList.add('explorer', 'upgrade-only');
        input.style.display = 'none';
        input.required = false; // critical: skip HTML validation
        btn.textContent = 'explorer access';
      }
    }

    // ── Loader bar ──
    const loaderBar  = $('loaderBar');
    const loaderFill = $('loaderFill');
    const loaderPct  = $('loaderPct');
    let loaderShown = false;
    let explorerUnlocked = false;

    function updateLoader() {
      const discovered = spots.filter(s => s.discovered).length;
      const total = spots.length;

      if (!loaderShown && discovered > 0) {
        loaderShown = true;
        loaderBar.classList.add('visible');
      }

      loaderFill.style.width = (discovered / total * 100) + '%';
      loaderPct.textContent = discovered + '/' + total;

      // ── All 6 found: unlock explorer ──
      if (discovered === total && !explorerUnlocked) {
        explorerUnlocked = true;
        LS.markExplorer();

        // Osscar → amber
        $('osscarIcon').classList.add('explorer');

        // Loader → amber
        loaderFill.style.background = '#c9952a';
        document.querySelector('.loader-label').innerHTML = 'unlocked';
        document.querySelector('.loader-label').style.color = 'rgba(201, 149, 42, 0.6)';
        document.querySelector('.loader-pct').style.color = 'rgba(201, 149, 42, 0.6)';

        // What to show depends on current submission state
        if (LS.hasSubmitted()) {
          // Already on waitlist → just show upgrade button (no email needed)
          showForm('upgrade');
        } else {
          // Never submitted → full explorer form
          showForm('explorer');
        }
      }
    }

    // ── Restore state on page load ──
    (function restoreState() {
      if (LS.isExplorer()) {
        // Show loader bar fully filled in amber — instant, no animation
        explorerUnlocked = true;
        $('osscarIcon').classList.add('explorer');
        loaderShown = true;
        // Disable transitions for instant display
        loaderBar.style.transition = 'none';
        loaderFill.style.transition = 'none';
        loaderBar.classList.add('visible');
        loaderFill.style.width = '100%';
        loaderFill.style.background = '#c9952a';
        loaderPct.textContent = '6/6';
        loaderPct.style.color = 'rgba(201, 149, 42, 0.6)';
        document.querySelector('.loader-label').innerHTML = 'unlocked';
        document.querySelector('.loader-label').style.color = 'rgba(201, 149, 42, 0.6)';
      }

      if (LS.isExplorer() && LS.hasSubmitted()) {
        showMessage('you are an explorer', AMBER);
        // Instant — no fade-in for returning explorers
        success.style.transition = 'none';
      } else if (LS.isExplorer() && !LS.hasSubmitted()) {
        showForm('explorer');
      } else if (LS.hasSubmitted()) {
        showMessage('you are on the list');
      }
      // else: fresh visitor → default form already visible
    })();

    // ── Custom email validation ──
    const emailError = $('emailError');
    function validateEmail() {
      const v = input.value.trim();
      input.classList.remove('invalid');
      emailError.classList.remove('show');
      if (!v) {
        input.classList.add('invalid');
        emailError.textContent = 'enter your email';
        emailError.classList.add('show');
        return false;
      }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
        input.classList.add('invalid');
        emailError.textContent = 'invalid email format';
        emailError.classList.add('show');
        return false;
      }
      return true;
    }
    input.addEventListener('input', () => {
      input.classList.remove('invalid');
      emailError.classList.remove('show');
    });

    // ── Form submit handler ──
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const isUpgrade = form.classList.contains('upgrade-only');
      // Validate email only when input is visible
      if (!isUpgrade && !validateEmail()) return;
      const email = isUpgrade ? LS.getEmail() : input.value;

      if (!email) {
        // Edge case: upgrade mode but no stored email → show full explorer form
        showForm('explorer');
        return;
      }

      // Clear any previous submit error
      input.classList.remove('invalid');
      emailError.classList.remove('show');

      btn.textContent = '...';
      btn.disabled = true;

      try {
        const formData = new URLSearchParams();
        formData.append('email', email);
        if (explorerUnlocked) formData.append('insider', 'true');
        await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: formData });

        LS.markSubmitted(email);
        if (explorerUnlocked) LS.markExplorer();
        if (window.posthog) posthog.capture('email_submitted', { insider: explorerUnlocked, upgrade: form.classList.contains('upgrade-only') });

        // ── Confirmation message ──
        if (explorerUnlocked) {
          // Both upgrade and first-time explorer get the same gold message
          showMessage('gg, you are now an explorer', AMBER);
        } else {
          // Normal waitlist
          showMessage("you are on the list");
        }
      } catch (err) {
        btn.textContent = explorerUnlocked ? 'explorer access' : 'notify me';
        btn.disabled = false;
        input.classList.add('invalid');
        emailError.textContent = 'oops, try again';
        emailError.classList.add('show');
      }
    });
    // ── Animated favicon: alternate Supabase ⚡ / >commit ──
    (function animFavicon() {
      const link = document.querySelector('link[rel="icon"]');
      const frames = [
        // Supabase bolt (green on dark)
        "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="4" fill="#0a0a0a"/><path d="M17.5 28.6c-.7.9-2.2.4-2.2-.8l-.3-17.5h11.8c2.1 0 3.3 2.5 1.9 4.2L17.5 28.6Z" fill="#3ECF8E" fill-opacity="0.7"/><path d="M14.5 3.4c.7-.9 2.2-.4 2.2.8l.1 17.5H5c-2.1 0-3.3-2.5-1.9-4.2L14.5 3.4Z" fill="#3ECF8E"/></svg>'),
        // >commit logo (red bg, white shapes)
        "data:image/svg+xml," + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 41"><rect x="0" y="0" width="40" height="41" rx="4" fill="#FA0C08"/><path d="M10.2323 20.1152H29.7433C27.9096 16.2032 24.2177 13.5382 19.9878 13.5382C15.758 13.5382 12.0661 16.2032 10.2323 20.1152Z" fill="white"/><path d="M5.5135 21.8023H38.3252V23.6116L5.5135 21.8023Z" fill="white"/><path d="M1.67487 23.5138V27.9392L38.3252 25.6653V25.5431L1.67487 23.5138Z" fill="white"/><path d="M1.65041 30.2375V31.6556L38.3008 36.4233V27.9636L1.65041 30.2375Z" fill="white"/><path d="M1.65041 34.7363V38.9905H34.291L1.65041 34.7363Z" fill="white"/></svg>'),
      ];
      let i = 0;
      setInterval(() => {
        i = (i + 1) % frames.length;
        link.href = frames[i];
      }, 2000);
    })();
  </script>
</body>
</html>
